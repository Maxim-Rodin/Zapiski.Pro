server {
    listen 80 default_server;
    server_name app-zapisi-pro.site www.app-zapisi-pro.site;

    root /usr/share/nginx/landing;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~ ^/(?:user|master|admin)(?:/|$) {
        root /usr/share/nginx/miniapp;
        try_files $uri /index.html =404;
    }

    location ^~ /assets/ {
        root /usr/share/nginx/miniapp;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        root /usr/share/nginx/miniapp;
    }

    location = /icons.svg {
        root /usr/share/nginx/miniapp;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name api.app-zapisi-pro.site;

    location / {
        proxy_pass http://bot:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
